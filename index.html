<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <div id="game-container">
            
            <img src="" alt="Cute Image" class="main-image" id="main-image">
            
            <h1 class="header-text" id="question-text">Loading...</h1>
            
            <div class="buttons-container">
                <button class="btn yes-btn" onclick="nextQuestion()">Yes</button>
                <button class="btn no-btn" id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
            </div>
        </div>

        <div id="success-container" class="hidden">
            <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Bear Kiss" class="gif">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExczhnczVyYnk1YTZ2OWk1YTdjOHhxc3FrZ3RoaG5hNmdsNmdwbGlzeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/89x4osEodHEoo/200w.webp" alt="Yes" class="gif">
            <h1 class="header-text">Yes! See you on the 14th! ❤️</h1>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
